<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#66bb6a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb74d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffa726;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="10"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">Skill Orchestrator 工作流程</text>

  <!-- Step 1: User Input -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="120" height="50" rx="8" fill="#e1f5fe" stroke="#4fc3f7" stroke-width="2"/>
    <text x="90" y="88" font-family="Arial, sans-serif" font-size="11" fill="#0277bd" text-anchor="middle">👤 用户请求</text>
    <text x="90" y="105" font-family="Arial, sans-serif" font-size="10" fill="#01579b" text-anchor="middle">"分析CSV做PPT"</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M155 95 L185 95" stroke="#90a4ae" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#90a4ae"/></marker></defs>

  <!-- Step 2: Task Decomposition -->
  <g filter="url(#shadow)">
    <rect x="190" y="60" width="140" height="70" rx="8" fill="#e8eaf6" stroke="#7986cb" stroke-width="2"/>
    <text x="260" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#303f9f" text-anchor="middle">📋 任务分解</text>
    <text x="260" y="97" font-family="Arial, sans-serif" font-size="9" fill="#3f51b5" text-anchor="middle">Goal + Inputs</text>
    <text x="260" y="112" font-family="Arial, sans-serif" font-size="9" fill="#3f51b5" text-anchor="middle">Outputs + Capabilities</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M335 95 L365 95" stroke="#90a4ae" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Capability Matching -->
  <g filter="url(#shadow)">
    <rect x="370" y="55" width="140" height="80" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="2"/>
    <text x="440" y="75" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">🎯 能力匹配</text>
    <text x="440" y="93" font-family="Arial, sans-serif" font-size="9" fill="#ef6c00" text-anchor="middle">spreadsheet: 90%</text>
    <text x="440" y="108" font-family="Arial, sans-serif" font-size="9" fill="#ef6c00" text-anchor="middle">pptx: 85%</text>
    <text x="440" y="123" font-family="Arial, sans-serif" font-size="9" fill="#bf360c" text-anchor="middle">5因子置信度</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M515 95 L545 95" stroke="#90a4ae" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Risk Assessment -->
  <g filter="url(#shadow)">
    <rect x="550" y="60" width="130" height="70" rx="8" fill="#fce4ec" stroke="#f06292" stroke-width="2"/>
    <text x="615" y="80" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ad1457" text-anchor="middle">⚖️ 风险评估</text>
    <text x="615" y="97" font-family="Arial, sans-serif" font-size="9" fill="#c2185b" text-anchor="middle">Score: 0.38</text>
    <text x="615" y="112" font-family="Arial, sans-serif" font-size="9" fill="#c2185b" text-anchor="middle">Mode: SUGGEST</text>
  </g>

  <!-- Second Row -->

  <!-- Step 5: Execution Plan -->
  <g filter="url(#shadow)">
    <rect x="190" y="170" width="200" height="90" rx="8" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
    <text x="290" y="192" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">📊 执行计划</text>

    <!-- Dependency Graph Mini -->
    <rect x="210" y="205" width="70" height="25" rx="4" fill="#c8e6c9" stroke="#66bb6a"/>
    <text x="245" y="221" font-family="Arial, sans-serif" font-size="8" fill="#2e7d32" text-anchor="middle">Step1: xlsx</text>

    <rect x="300" y="205" width="70" height="25" rx="4" fill="#c8e6c9" stroke="#66bb6a"/>
    <text x="335" y="221" font-family="Arial, sans-serif" font-size="8" fill="#2e7d32" text-anchor="middle">Step2: pptx</text>

    <path d="M280 217 L300 217" stroke="#66bb6a" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
    <defs><marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#66bb6a"/></marker></defs>

    <text x="290" y="248" font-family="Arial, sans-serif" font-size="8" fill="#388e3c" text-anchor="middle">并行组: [Step1] → [Step2]</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M395 260 L425 260" stroke="#90a4ae" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 6: Execute -->
  <g filter="url(#shadow)">
    <rect x="430" y="170" width="140" height="90" rx="8" fill="#e3f2fd" stroke="#64b5f6" stroke-width="2"/>
    <text x="500" y="192" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">✅ 执行</text>

    <!-- Progress Bar -->
    <rect x="445" y="205" width="100" height="12" rx="6" fill="#e0e0e0"/>
    <rect x="445" y="205" width="70" height="12" rx="6" fill="url(#blueGrad)"/>
    <text x="495" y="214" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle">70%</text>

    <text x="500" y="230" font-family="Arial, sans-serif" font-size="9" fill="#1976d2" text-anchor="middle">Step1: spreadsheet ✅</text>
    <text x="500" y="245" font-family="Arial, sans-serif" font-size="9" fill="#1976d2" text-anchor="middle">Step2: pptx 🔄</text>
  </g>

  <!-- Arrow 5 -->
  <path d="M575 260 L605 260" stroke="#90a4ae" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 7: Review -->
  <g filter="url(#shadow)">
    <rect x="610" y="170" width="120" height="90" rx="8" fill="#fff8e1" stroke="#ffd54f" stroke-width="2"/>
    <text x="670" y="192" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f57f17" text-anchor="middle">📝 回顾</text>
    <text x="670" y="212" font-family="Arial, sans-serif" font-size="9" fill="#f9a825" text-anchor="middle">• 学习用户偏好</text>
    <text x="670" y="227" font-family="Arial, sans-serif" font-size="9" fill="#f9a825" text-anchor="middle">• 记录成功率</text>
    <text x="670" y="242" font-family="Arial, sans-serif" font-size="9" fill="#f9a825" text-anchor="middle">• 优化未来匹配</text>
  </g>

  <!-- Connecting lines to second row -->
  <path d="M260 135 L260 160 L290 160" stroke="#90a4ae" stroke-width="1.5" fill="none" stroke-dasharray="4"/>
  <path d="M440 135 L440 160 L500 160" stroke="#90a4ae" stroke-width="1.5" fill="none" stroke-dasharray="4"/>
  <path d="M615 135 L615 155 L670 155" stroke="#90a4ae" stroke-width="1.5" fill="none" stroke-dasharray="4"/>

  <!-- Bottom Labels -->
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="10" fill="#607d8b" text-anchor="middle">执行模式决策流程</text>

  <!-- Mode boxes -->
  <g transform="translate(130, 310)">
    <rect x="0" y="0" width="80" height="35" rx="6" fill="#c8e6c9" stroke="#66bb6a"/>
    <text x="40" y="15" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2e7d32" text-anchor="middle">AUTO</text>
    <text x="40" y="27" font-family="Arial, sans-serif" font-size="7" fill="#388e3c" text-anchor="middle">risk ≤ 0.25</text>
  </g>

  <g transform="translate(230, 310)">
    <rect x="0" y="0" width="80" height="35" rx="6" fill="#fff3e0" stroke="#ffb74d"/>
    <text x="40" y="15" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#e65100" text-anchor="middle">SUGGEST</text>
    <text x="40" y="27" font-family="Arial, sans-serif" font-size="7" fill="#ef6c00" text-anchor="middle">0.25-0.50</text>
  </g>

  <g transform="translate(330, 310)">
    <rect x="0" y="0" width="80" height="35" rx="6" fill="#ffebee" stroke="#ef9a9a"/>
    <text x="40" y="15" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#c62828" text-anchor="middle">PLAN</text>
    <text x="40" y="27" font-family="Arial, sans-serif" font-size="7" fill="#d32f2f" text-anchor="middle">risk &gt; 0.50</text>
  </g>

  <g transform="translate(430, 310)">
    <rect x="0" y="0" width="80" height="35" rx="6" fill="#e3f2fd" stroke="#64b5f6"/>
    <text x="40" y="15" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1565c0" text-anchor="middle">THINK</text>
    <text x="40" y="27" font-family="Arial, sans-serif" font-size="7" fill="#1976d2" text-anchor="middle">how would?</text>
  </g>

  <!-- Arrow between modes -->
  <path d="M215 327 L225 327" stroke="#90a4ae" stroke-width="1.5" fill="none" marker-end="url(#arrowGrey)"/>
  <path d="M315 327 L325 327" stroke="#90a4ae" stroke-width="1.5" fill="none" marker-end="url(#arrowGrey)"/>
  <path d="M415 327 L425 327" stroke="#90a4ae" stroke-width="1.5" fill="none" marker-end="url(#arrowGrey)"/>
  <defs><marker id="arrowGrey" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#90a4ae"/></marker></defs>

  <!-- Cost estimation box -->
  <g transform="translate(530, 310)">
    <rect x="0" y="0" width="150" height="35" rx="6" fill="#f3e5f5" stroke="#ce93d8"/>
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7b1fa2" text-anchor="middle">💰 成本估算</text>
    <text x="75" y="27" font-family="Arial, sans-serif" font-size="8" fill="#8e24aa" text-anchor="middle">Token: ~2,500 | Time: ~15s</text>
  </g>

  <!-- Footer -->
  <text x="400" y="385" font-family="Arial, sans-serif" font-size="9" fill="#90a4ae" text-anchor="middle">Skill Orchestrator v1.0 | github.com/sl820/skill-orchestrator</text>
</svg>
